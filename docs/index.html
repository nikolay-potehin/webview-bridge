<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Where Are My Kids</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #6B9FD4;
      --primary-dark: #5489C0;
      --secondary: #F4B4C4;
      --secondary-dark: #E89DAE;
      --bg: #FAFBFC;
      --bg-card: #FFFFFF;
      --text: #3A4A5C;
      --text-muted: #8A9BAE;
      --shadow: 0 2px 12px rgba(107, 159, 212, 0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    header .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
    }

    header .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ADE80;
      margin-left: auto;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column-reverse;
      gap: 10px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: var(--shadow);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.outgoing {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.incoming {
      align-self: flex-start;
      background: var(--bg-card);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message .time {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
    }

    .message .waveform-mini {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 24px;
      margin: 4px 0;
    }

    .message .waveform-mini .bar {
      width: 3px;
      border-radius: 2px;
      background: currentColor;
      opacity: 0.7;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 20px;
      font-size: 14px;
    }

    #recording-bar {
      display: none;
      padding: 12px 20px;
      background: var(--bg-card);
      border-top: 1px solid rgba(107, 159, 212, 0.1);
      align-items: center;
      gap: 12px;
    }

    #recording-bar.active {
      display: flex;
    }

    #recording-bar .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #EF4444;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    #recording-bar .timer {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    #recording-bar canvas {
      flex: 1;
      height: 32px;
    }

    #input-bar {
      padding: 12px 16px;
      background: var(--bg-card);
      border-top: 1px solid rgba(107, 159, 212, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
    }

    #mic-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(107, 159, 212, 0.3);
      transition: all 0.2s;
    }

    #mic-btn:active {
      transform: scale(0.92);
    }

    #mic-btn.recording {
      background: var(--secondary);
      box-shadow: 0 4px 16px rgba(244, 180, 196, 0.4);
    }

    #status {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <header>
    <div class="avatar">👶</div>
    <h1>Where Are My Kids</h1>
    <div class="status-dot"></div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty">No messages yet.<br>Tap the mic to send a voice message.</div>
  </div>

  <div id="recording-bar">
    <div class="rec-dot"></div>
    <span class="timer" id="timer">0:00</span>
    <canvas id="waveform"></canvas>
  </div>

  <div id="input-bar">
    <button id="mic-btn" onclick="toggleRecording()">
      <svg id="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3z" />
        <path d="M19 11a1 1 0 10-2 0 5 5 0 01-10 0 1 1 0 10-2 0 7 7 0 006 6.92V21H8a1 1 0 100 2h8a1 1 0 100-2h-3v-3.08A7 7 0 0019 11z" />
      </svg>
      <svg id="stop-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <rect x="6" y="6" width="12" height="12" rx="2" />
      </svg>
    </button>
  </div>
  <div id="status"></div>

  <script>
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty');
    const micBtn = document.getElementById('mic-btn');
    const micIcon = document.getElementById('mic-icon');
    const stopIcon = document.getElementById('stop-icon');
    const recBar = document.getElementById('recording-bar');
    const timerEl = document.getElementById('timer');
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');

    let isRecording = false;
    let recStartTime = 0;
    let timerInterval = null;
    const MAX_BARS = 80;
    let levels = [];

    // ── Chat history (in-memory, appended to DOM) ────────────
    let messageCount = 0;

    function createMessageEl(text, waveform, timestamp) {
      const div = document.createElement('div');
      div.className = 'message outgoing';
      const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      let barsHtml = '';
      if (waveform && waveform.length) {
        barsHtml = '<div class="waveform-mini">' +
          waveform.map(v => '<div class="bar" style="height:' + Math.max(3, v * 24) + 'px"></div>').join('') +
          '</div>';
      }
      div.innerHTML = barsHtml + '<div>' + text + '</div><div class="time">' + time + '</div>';
      return div;
    }

    function addMessage(text, waveform) {
      messageCount++;
      empty.style.display = 'none';
      const el = createMessageEl(text, waveform, Date.now());
      // flex-direction-reverse: appendChild puts newest at bottom
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
    }

    // ── Recording ────────────────────────────────────────────
    function toggleRecording() {
      if (isRecording) {
        stopStream();
      } else {
        startStream();
      }
    }

    function startStream() {
      isRecording = true;
      levels = [];
      micBtn.classList.add('recording');
      micIcon.style.display = 'none';
      stopIcon.style.display = 'block';
      recBar.classList.add('active');
      recStartTime = Date.now();
      timerInterval = setInterval(updateTimer, 1000);
      // Canvas was hidden when resizeCanvas() ran at init — resize now.
      resizeCanvas();
      FlutterBridge.postMessage('start_stream');
    }

    function stopStream() {
      isRecording = false;
      micBtn.classList.remove('recording');
      micIcon.style.display = 'block';
      stopIcon.style.display = 'none';
      recBar.classList.remove('active');
      clearInterval(timerInterval);
      // Save recording to chat history with sampled waveform.
      const sampled = sampleWaveform(levels, 30);
      const duration = formatTime((Date.now() - recStartTime) / 1000);
      addMessage('Voice message · ' + duration, sampled);
      FlutterBridge.postMessage('stop_stream');
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
      timerEl.textContent = formatTime(elapsed);
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function sampleWaveform(arr, count) {
      if (!arr.length) return [];
      const result = [];
      const step = arr.length / count;
      for (let i = 0; i < count; i++) {
        const idx = Math.floor(i * step);
        result.push(arr[idx] || 0);
      }
      return result;
    }

    // ── Waveform canvas ───────────────────────────────────────
    function resizeCanvas() {
      canvas.width = canvas.offsetWidth * devicePixelRatio;
      canvas.height = canvas.offsetHeight * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function drawBars() {
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      const barWidth = w / MAX_BARS;
      ctx.clearRect(0, 0, w, h);
      for (let i = 0; i < levels.length; i++) {
        const barHeight = Math.max(2, levels[i] * h);
        const x = i * barWidth;
        const y = (h - barHeight) / 2;
        ctx.fillStyle = '#6B9FD4';
        ctx.fillRect(x + 1, y, barWidth - 2, barHeight);
      }
      requestAnimationFrame(drawBars);
    }
    drawBars();

    // ── Called from Dart ──────────────────────────────────────
    function updateLevel(level) {
      if (!isRecording) return;
      levels.push(Math.min(1, Math.max(0, level)));
      if (levels.length > MAX_BARS) levels.shift();
    }

    function updateStatus(text) {
      document.getElementById('status').innerText = text;
    }
  </script>
</body>

</html>
